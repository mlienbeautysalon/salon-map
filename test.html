<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Map</title>
  <style>
    #map {
      height: 600px;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
let map;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 35.681236, lng: 139.767125 },
    zoom: 12,
  });

  fetch("https://script.google.com/macros/s/AKfycby07pFcIBtFkli4AepNal3u2tRMF18IrVPw1EBH-1shfffcYoE7bRMbmdceB2mlC0ai/exec")
    .then(res => res.json())
    .then(data => {
      data.forEach(item => {
        const marker = new google.maps.Marker({
          position: {
            lat: Number(item.lat),
            lng: Number(item.lng)
          },
          map: map,
          title: item.salon,
        });
      });
    });
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB4TMDULFheEZiNLkcMLw2w8xmilGffr9o&callback=initMap">
</script>

</body>
</html>
