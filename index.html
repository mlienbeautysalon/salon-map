<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>空き枠マップ — SalonNow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A96E; --gold-dark: #A07840; --black: #0a0a0a;
    --white: #fafafa; --cream: #f5f0eb; --text: #1a1a1a;
    --muted: #666; --border: #e0d8d0;
  }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f0ece6; }
  .header {
    background: var(--black); color: var(--white);
    padding: 14px 16px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-size: 16px; font-weight: 700; color: var(--gold); }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .refresh-btn {
    background: rgba(201,169,110,0.2); border: 1px solid rgba(201,169,110,0.4);
    color: var(--gold); font-size: 12px; padding: 6px 12px;
    border-radius: 20px; cursor: pointer;
  }
  #map { width: 100%; height: 52vw; max-height: 320px; }
  .section-title {
    padding: 16px 16px 8px; font-size: 12px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }
  .slot-list { padding: 0 12px 100px; display: flex; flex-direction: column; gap: 10px; }
  .slot-card {
    background: var(--white); border-radius: 12px;
    overflow: hidden; border: 1.5px solid transparent;
  }
  .slot-card-inner { display: flex; align-items: stretch; }
  .slot-accent { width: 5px; background: var(--gold); flex-shrink: 0; }
  .slot-body {
    flex: 1; padding: 14px 14px 14px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .slot-info { flex: 1; }
  .slot-datetime { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .slot-menu { font-size: 12px; color: var(--muted); }
  .slot-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .slot-price { font-size: 16px; font-weight: 700; color: var(--gold); }
  .book-btn {
    background: var(--gold); color: var(--black); border: none;
    padding: 8px 16px; border-radius: 20px; font-size: 12px;
    font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.7; }
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 40px; gap: 8px; color: var(--muted); font-size: 13px;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--white); width: 100%; max-width: 480px;
    border-radius: 20px 20px 0 0; padding: 28px 20px 40px;
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .modal-summary { background: var(--cream); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
  .modal-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .modal-row .label { color: var(--muted); }
  .modal-row .value { font-weight: 700; color: var(--text); }
  .modal-price { font-size: 22px; font-weight: 700; color: var(--gold); text-align: right; margin-top: 8px; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .form-input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-size: 15px; color: var(--text);
    outline: none; -webkit-appearance: none; background: var(--white); font-family: inherit;
  }
  .form-input:focus { border-color: var(--gold); }
  .confirm-btn {
    width: 100%; background: var(--gold); color: var(--black); border: none;
    padding: 16px; font-size: 15px; font-weight: 700; border-radius: 12px;
    cursor: pointer; margin-top: 8px; font-family: inherit;
  }
  .cancel-link { display: block; text-align: center; color: var(--muted); font-size: 13px; margin-top: 14px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">空き枠マップ</div>
    <div class="header-sub" id="lastUpdated">読み込み中...</div>
  </div>
  <button class="refresh-btn" onclick="loadSlots()">更新</button>
</div>

<div id="map"></div>

<div class="section-title">今日の空き枠</div>
<div class="slot-list" id="slotList">
  <div class="loading"><div class="spinner"></div>空き枠を取得中...</div>
</div>

<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">予約する</div>
    <div class="modal-sub" id="modalSalonName"></div>
    <div class="modal-summary">
      <div class="modal-row"><span class="label">日時</span><span class="value" id="modalDatetime">-</span></div>
      <div class="modal-row"><span class="label">メニュー</span><span class="value" id="modalMenu">-</span></div>
      <div class="modal-price" id="modalPrice">-</div>
    </div>
    <div class="form-group">
      <label class="form-label">お名前（必須）</label>
      <input class="form-input" type="text" id="inputName" placeholder="山田 花子" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">メールアドレス（必須）</label>
      <input class="form-input" type="email" id="inputEmail" placeholder="example@email.com" autocomplete="email">
    </div>
    <button class="confirm-btn" onclick="confirmBooking()">予約フォームへ進む →</button>
    <span class="cancel-link" onclick="closeModal()">キャンセル</span>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzrhi-VWfs-Ipxp-6xcUh1hHZvsv-OwTv9YUFYfINMzREyYWGpROV0XigL5DvJ3ZSsj9g/exec';
const SALON_NAME = 'bijou beauty';
const SALON_LAT  = 35.6540984;
const SALON_LNG  = 139.7353651;
const SALON_ADDR = '美肌専門店 Bijou Beauté';
let slots = [];
let selectedSlot = null;
let map, marker;

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: SALON_LAT, lng: SALON_LNG },
    zoom: 16,
    disableDefaultUI: true,
    zoomControl: true,
    styles: [{ featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] }]
  });
  marker = new google.maps.Marker({
    position: { lat: SALON_LAT, lng: SALON_LNG },
    map,
    title: SALON_NAME,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 14,
      fillColor: '#C9A96E',
      fillOpacity: 1,
      strokeColor: '#FFFFFF',
      strokeWeight: 3
    }
  });
  const infoWindow = new google.maps.InfoWindow({
    content: '<div style="font-size:13px;font-weight:700;padding:4px 8px;">' + SALON_NAME + '</div>' +
             '<div style="font-size:12px;color:#666;padding:0 8px 4px;">' + SALON_ADDR + '</div>'
  });
  marker.addListener('click', () => infoWindow.open(map, marker));
  loadSlots();
}

async function loadSlots() {
  document.getElementById('slotList').innerHTML =
    '<div class="loading"><div class="spinner"></div>空き枠を取得中...</div>';
  try {
    const res  = await fetch(API_URL + '?action=slots');
    const data = await res.json();
    slots = Array.isArray(data) ? data : [];
  } catch (e) {
    slots = [];
  }
  renderSlots();
  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    '最終更新 ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
}

function renderSlots() {
  const list = document.getElementById('slotList');
  if (slots.length === 0) {
    list.innerHTML =
      '<div class="empty-state"><div class="empty-icon">📅</div>' +
      '<div class="empty-text">現在空き枠はありません。<br>またのご確認をお待ちしています。</div></div>';
    return;
  }
  list.innerHTML = slots.map((slot, i) =>
    '<div class="slot-card" onclick="openModal(' + i + ')">' +
      '<div class="slot-card-inner">' +
        '<div class="slot-accent"></div>' +
        '<div class="slot-body">' +
          '<div class="slot-info">' +
            '<div class="slot-datetime">' + escHtml(slot.display) + '</div>' +
            '<div class="slot-menu">' + escHtml(slot.menu) + '</div>' +
          '</div>' +
          '<div class="slot-right">' +
            '<div class="slot-price">' + escHtml(slot.price) + '</div>' +
            '<button class="book-btn" onclick="openModal(' + i + ');event.stopPropagation()">予約する</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>'
  ).join('');
}

function openModal(index) {
  selectedSlot = slots[index];
  document.getElementById('modalSalonName').textContent = SALON_NAME;
  document.getElementById('modalDatetime').textContent  = selectedSlot.display;
  document.getElementById('modalMenu').textContent      = selectedSlot.menu;
  document.getElementById('modalPrice').textContent     = selectedSlot.price;
  document.getElementById('inputName').value  = '';
  document.getElementById('inputEmail').value = '';
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalBackdrop')) {
    document.getElementById('modalBackdrop').classList.remove('open');
    selectedSlot = null;
  }
}

function confirmBooking() {
  const name  = document.getElementById('inputName').value.trim();
  const email = document.getElementById('inputEmail').value.trim();
  if (!name)  { alert('お名前を入力してください'); return; }
  if (!email) { alert('メールアドレスを入力してください'); return; }
  if (!email.includes('@')) { alert('正しいメールアドレスを入力してください'); return; }
  if (!selectedSlot || !selectedSlot.formUrl) {
    alert('予約情報の取得に失敗しました。ページを更新してお試しください。');
    return;
  }
  let url = selectedSlot.formUrl;
  url += '&entry.1260934485=' + encodeURIComponent(name);
  url += '&entry.254438459='  + encodeURIComponent(email);
  document.getElementById('modalBackdrop').classList.remove('open');
  window.location.href = url;
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

setInterval(loadSlots, 15 * 60 * 1000);
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCw8HLg0q8nN6pnpV54feMB5LOQSTOXnNc&callback=initMap&language=ja" async defer></script>

</body>
</html>
