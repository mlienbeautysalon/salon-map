<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>空き枠マップ — SalonNow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A96E; --gold-dark: #A07840; --black: #0a0a0a;
    --white: #fafafa; --cream: #f5f0eb; --text: #1a1a1a;
    --muted: #666; --border: #e0d8d0;
  }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f0ece6; }
  .header {
    background: var(--black); color: var(--white);
    padding: 14px 16px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-size: 16px; font-weight: 700; color: var(--gold); }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .refresh-btn {
    background: rgba(201,169,110,0.2); border: 1px solid rgba(201,169,110,0.4);
    color: var(--gold); font-size: 12px; padding: 6px 12px;
    border-radius: 20px; cursor: pointer; white-space: nowrap;
  }
  .search-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; background: var(--white);
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 20px;
    padding: 8px 16px; font-size: 14px; font-family: inherit;
    outline: none; color: var(--text); background: var(--white);
  }
  .search-input:focus { border-color: var(--gold); }
  .location-btn {
    background: var(--gold); border: none; color: var(--black);
    width: 36px; height: 36px; border-radius: 50%;
    font-size: 16px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #map { width: 100%; height: 52vw; max-height: 300px; }
  .section-title {
    padding: 16px 16px 8px; font-size: 12px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between;
  }
  .area-label {
    font-size: 11px; color: var(--gold); font-weight: 500;
    background: rgba(201,169,110,0.1); padding: 3px 10px;
    border-radius: 10px; margin-right: 16px;
  }
  .slot-list { padding: 0 12px 100px; display: flex; flex-direction: column; gap: 10px; }
  .slot-card { background: var(--white); border-radius: 12px; overflow: hidden; border: 1.5px solid transparent; }
  .slot-card-inner { display: flex; align-items: stretch; }
  .slot-accent { width: 5px; flex-shrink: 0; }
  .slot-body {
    flex: 1; padding: 14px 14px 14px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .slot-info { flex: 1; }
  .slot-salon { font-size: 11px; color: var(--gold); font-weight: 700; margin-bottom: 2px; }
  .slot-datetime { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .slot-menu { font-size: 12px; color: var(--muted); }
  .slot-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .slot-price { font-size: 16px; font-weight: 700; color: var(--gold); }
  .book-btn {
    color: var(--black); border: none; padding: 8px 16px;
    border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.7; }
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 40px; gap: 8px; color: var(--muted); font-size: 13px;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--white); width: 100%; max-width: 480px;
    border-radius: 20px 20px 0 0; padding: 28px 20px 40px;
    position: relative;
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .modal-summary { background: var(--cream); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
  .modal-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .modal-row .label { color: var(--muted); }
  .modal-row .value { font-weight: 700; color: var(--text); }
  .modal-price { font-size: 22px; font-weight: 700; color: var(--gold); text-align: right; margin-top: 8px; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .form-input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-size: 15px; color: var(--text);
    outline: none; background: var(--white); font-family: inherit;
  }
  .form-input:focus { border-color: var(--gold); }
  .confirm-btn {
    width: 100%; background: var(--gold); color: var(--black); border: none;
    padding: 16px; font-size: 15px; font-weight: 700; border-radius: 12px;
    cursor: pointer; margin-top: 8px; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .confirm-btn:disabled { background: #ccc; cursor: not-allowed; }
  .cancel-link { display: block; text-align: center; color: var(--muted); font-size: 13px; margin-top: 14px; cursor: pointer; }

  /* 完了画面 */
  .complete-screen {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 300;
    align-items: center; justify-content: center;
  }
  .complete-screen.open { display: flex; }
  .complete-card {
    background: var(--white); border-radius: 20px;
    padding: 40px 28px; max-width: 340px; width: 90%;
    text-align: center;
  }
  .complete-icon { font-size: 56px; margin-bottom: 16px; }
  .complete-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .complete-msg { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
  .complete-detail {
    background: var(--cream); border-radius: 10px;
    padding: 16px; margin-bottom: 24px; text-align: left;
  }
  .complete-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .complete-row .label { color: var(--muted); }
  .complete-row .value { font-weight: 700; color: var(--text); }
  .complete-close {
    width: 100%; background: var(--gold); color: var(--black); border: none;
    padding: 14px; font-size: 14px; font-weight: 700; border-radius: 10px;
    cursor: pointer; font-family: inherit;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">空き枠マップ</div>
    <div class="header-sub" id="lastUpdated">読み込み中...</div>
  </div>
  <div class="header-right">
    <button class="refresh-btn" onclick="loadSlots()">更新</button>
  </div>
</div>

<div class="search-bar">
  <input class="search-input" type="text" id="searchInput"
    placeholder="エリアを検索（例：渋谷、横浜）"
    onkeydown="if(event.key==='Enter')searchArea()">
  <button class="location-btn" onclick="goToCurrentLocation()" title="現在地">📍</button>
</div>

<div id="map"></div>

<div class="section-title">
  <span>空き枠一覧</span>
  <span class="area-label" id="areaLabel">エリア全体</span>
</div>
<div class="slot-list" id="slotList">
  <div class="loading"><div class="spinner"></div>空き枠を取得中...</div>
</div>

<!-- 予約モーダル -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">予約する</div>
    <div class="modal-sub">予約内容の確認</div>
    <div class="modal-summary">
      <div class="modal-row"><span class="label">サロン</span><span class="value" id="modalSalon">-</span></div>
      <div class="modal-row"><span class="label">日時</span><span class="value" id="modalDatetime">-</span></div>
      <div class="modal-row"><span class="label">メニュー</span><span class="value" id="modalMenu">-</span></div>
      <div class="modal-price" id="modalPrice">-</div>
    </div>
    <div class="form-group">
      <label class="form-label">お名前（必須）</label>
      <input class="form-input" type="text" id="inputName" placeholder="山田 花子" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">メールアドレス（必須）</label>
      <input class="form-input" type="email" id="inputEmail" placeholder="example@email.com" autocomplete="email">
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="confirmBooking()">予約を確定する ✓</button>
    <span class="cancel-link" onclick="closeModal()">キャンセル</span>
  </div>
</div>

<!-- 完了画面 -->
<div class="complete-screen" id="completeScreen">
  <div class="complete-card">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">予約完了！</div>
    <div class="complete-msg">予約確認メールをお送りしました。<br>ご確認ください。</div>
    <div class="complete-detail">
      <div class="complete-row"><span class="label">サロン</span><span class="value" id="compSalon">-</span></div>
      <div class="complete-row"><span class="label">お名前</span><span class="value" id="compName">-</span></div>
      <div class="complete-row"><span class="label">メニュー</span><span class="value" id="compMenu">-</span></div>
      <div class="complete-row"><span class="label">日時</span><span class="value" id="compDatetime">-</span></div>
      <div class="complete-row"><span class="label">料金</span><span class="value" id="compPrice">-</span></div>
      <div class="complete-row"><span class="label">受付番号</span><span class="value" id="compBookingId">-</span></div>
    </div>
    <button class="complete-close" onclick="closeComplete()">閉じる</button>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzrhi-VWfs-Ipxp-6xcUh1hHZvsv-OwTv9YUFYfINMzREyYWGpROV0XigL5DvJ3ZSsj9g/exec';

const SALONS_CONFIG = [
  {
    id:   'salon_001',
    name: 'bijou beauty',
    lat:  35.6540984,
    lng:  139.7353651,
    addr: '美肌専門店 Bijou Beauté'
  },
  // 2店舗目はここに追加
];

let slots             = [];
let filteredSlots     = [];
let selectedSlot      = null;
let map;
let geocoder;
let currentLocationMarker = null;

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 35.6540984, lng: 139.7353651 },
    zoom: 13,
    disableDefaultUI: true,
    zoomControl: true,
    styles: [{ featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] }]
  });
  geocoder = new google.maps.Geocoder();

  map.addListener('idle', () => {
    filterSlotsByMapBounds();
  });

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setCenter(latlng);
        map.setZoom(13);
        showCurrentLocationMarker(latlng);
      },
      () => {}
    );
  }

  loadSlots();
}

function goToCurrentLocation() {
  if (!navigator.geolocation) { alert('位置情報が使えません'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      map.setCenter(latlng);
      map.setZoom(14);
      showCurrentLocationMarker(latlng);
    },
    () => alert('位置情報を取得できませんでした。ブラウザの設定を確認してください。')
  );
}

function showCurrentLocationMarker(latlng) {
  if (currentLocationMarker) currentLocationMarker.setMap(null);
  currentLocationMarker = new google.maps.Marker({
    position: latlng,
    map,
    title: '現在地',
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 8,
      fillColor: '#4285F4',
      fillOpacity: 1,
      strokeColor: '#FFFFFF',
      strokeWeight: 2
    }
  });
}

function searchArea() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  geocoder.geocode({ address: query + ' 日本', language: 'ja' }, (results, status) => {
    if (status === 'OK' && results[0]) {
      map.setCenter(results[0].geometry.location);
      map.setZoom(13);
      document.getElementById('areaLabel').textContent = query + '周辺';
    } else {
      alert('「' + query + '」が見つかりませんでした');
    }
  });
}

function filterSlotsByMapBounds() {
  if (!map || slots.length === 0) return;
  const bounds = map.getBounds();
  if (!bounds) return;

  const visibleSalonIds = SALONS_CONFIG
    .filter(salon => bounds.contains({ lat: salon.lat, lng: salon.lng }))
    .map(salon => salon.id);

  filteredSlots = visibleSalonIds.length > 0
    ? slots.filter(slot => visibleSalonIds.includes(slot.salonId))
    : [];

  renderSlotCards();
}

async function loadSlots() {
  document.getElementById('slotList').innerHTML =
    '<div class="loading"><div class="spinner"></div>空き枠を取得中...</div>';
  try {
    const res  = await fetch(API_URL + '?action=slots');
    const data = await res.json();
    slots = Array.isArray(data) ? data : [];
  } catch (e) {
    slots = [];
  }
  renderMarkers();
  filterSlotsByMapBounds();
  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    '最終更新 ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
}

function renderMarkers() {
  if (window._markers) window._markers.forEach(m => m.setMap(null));
  window._markers = [];

  SALONS_CONFIG.forEach(salon => {
    const hasSlot = slots.some(s => s.salonId === salon.id);
    const marker  = new google.maps.Marker({
      position: { lat: salon.lat, lng: salon.lng },
      map,
      title: salon.name,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 14,
        fillColor:   hasSlot ? '#C9A96E' : '#cccccc',
        fillOpacity: 1,
        strokeColor: '#FFFFFF',
        strokeWeight: 3
      }
    });
    const infoWindow = new google.maps.InfoWindow({
      content:
        '<div style="font-size:13px;font-weight:700;padding:4px 8px;">' + salon.name + '</div>' +
        '<div style="font-size:12px;color:#666;padding:0 8px 4px;">' + salon.addr + '</div>' +
        (hasSlot
          ? '<div style="font-size:12px;color:#C9A96E;padding:0 8px 6px;">空き枠あり</div>'
          : '<div style="font-size:12px;color:#ccc;padding:0 8px 6px;">空き枠なし</div>')
    });
    marker.addListener('click', () => infoWindow.open(map, marker));
    window._markers.push(marker);
  });
}

function getSlotColor(startStr) {
  const now    = new Date();
  const todayY = now.getFullYear();
  const todayM = now.getMonth();
  const todayD = now.getDate();

  let slotY, slotM, slotD;
  const s = String(startStr);

  if (s.includes('T') || (s.includes('-') && !s.includes('/'))) {
    const d   = new Date(s);
    const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    slotY = jst.getUTCFullYear();
    slotM = jst.getUTCMonth();
    slotD = jst.getUTCDate();
  } else {
    const datePart = s.split(' ')[0].trim();
    const parts    = datePart.split('/');
    slotY = parseInt(parts[0], 10);
    slotM = parseInt(parts[1], 10) - 1;
    slotD = parseInt(parts[2], 10);
  }

  const diffDays = Math.round(
    (new Date(slotY, slotM, slotD) - new Date(todayY, todayM, todayD)) / 86400000
  );

  if (diffDays === 0) return { color: '#E74C3C', label: '今日' };
  if (diffDays === 1) return { color: '#F39C12', label: '明日' };
  return { color: '#2980B9', label: '明後日以降' };
}

function renderSlotCards() {
  const list = document.getElementById('slotList');

  if (filteredSlots.length === 0) {
    const hasAnySlot = slots.length > 0;
    list.innerHTML =
      '<div class="empty-state"><div class="empty-icon">📅</div>' +
      '<div class="empty-text">' +
      (hasAnySlot
        ? 'このエリアに空き枠はありません。<br>検索バーで別のエリアを探してみてください。'
        : '現在空き枠はありません。<br>またのご確認をお待ちしています。') +
      '</div></div>';
    return;
  }

  list.innerHTML = filteredSlots.map((slot, i) => {
    const c = getSlotColor(slot.start);
    return (
      '<div class="slot-card" onclick="openModal(' + i + ')">' +
        '<div class="slot-card-inner">' +
          '<div class="slot-accent" style="background:' + c.color + '"></div>' +
          '<div class="slot-body">' +
            '<div class="slot-info">' +
              '<span style="background:' + c.color + ';color:white;font-size:10px;font-weight:700;' +
              'padding:2px 8px;border-radius:10px;margin-bottom:4px;display:inline-block;">' + c.label + '</span>' +
              '<div class="slot-salon">' + escHtml(slot.salon) + '</div>' +
              '<div class="slot-datetime">' + escHtml(slot.display) + '</div>' +
              '<div class="slot-menu">' + escHtml(slot.menu) + '</div>' +
            '</div>' +
            '<div class="slot-right">' +
              '<div class="slot-price">' + escHtml(slot.price) + '</div>' +
              '<button class="book-btn" style="background:' + c.color + '" ' +
              'onclick="openModal(' + i + ');event.stopPropagation()">予約する</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

function openModal(index) {
  selectedSlot = filteredSlots[index];
  document.getElementById('modalSalon').textContent    = selectedSlot.salon;
  document.getElementById('modalDatetime').textContent = selectedSlot.display;
  document.getElementById('modalMenu').textContent     = selectedSlot.menu;
  document.getElementById('modalPrice').textContent    = selectedSlot.price;
  document.getElementById('inputName').value  = '';
  document.getElementById('inputEmail').value = '';
  const btn = document.getElementById('confirmBtn');
  btn.disabled = false;
  btn.textContent = '予約を確定する ✓';
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalBackdrop')) {
    document.getElementById('modalBackdrop').classList.remove('open');
    selectedSlot = null;
  }
}

async function confirmBooking() {
  const name  = document.getElementById('inputName').value.trim();
  const email = document.getElementById('inputEmail').value.trim();
  if (!name)                { alert('お名前を入力してください'); return; }
  if (!email)               { alert('メールアドレスを入力してください'); return; }
  if (!email.includes('@')) { alert('正しいメールアドレスを入力してください'); return; }
  if (!selectedSlot)        { alert('予約情報の取得に失敗しました。ページを更新してお試しください。'); return; }

  const btn = document.getElementById('confirmBtn');
  btn.disabled    = true;
  btn.textContent = '送信中...';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        name,
        email,
        slotId:    selectedSlot.id,
        menu:      selectedSlot.menu,
        datetime:  selectedSlot.display,
        price:     selectedSlot.price,
        salonName: selectedSlot.salon,
        lineUserId: ''
      })
    });

    const data = await res.json();

    if (data.status === 'ok') {
      document.getElementById('modalBackdrop').classList.remove('open');
      document.getElementById('compSalon').textContent     = selectedSlot.salon;
      document.getElementById('compName').textContent      = name + ' 様';
      document.getElementById('compMenu').textContent      = selectedSlot.menu;
      document.getElementById('compDatetime').textContent  = selectedSlot.display;
      document.getElementById('compPrice').textContent     = selectedSlot.price;
      document.getElementById('compBookingId').textContent = data.bookingId || '-';
      document.getElementById('completeScreen').classList.add('open');
      await loadSlots();
    } else if (data.status === 'full') {
      alert('申し訳ありません。この枠はすでに予約が入っておりました。他の枠をお選びください。');
      btn.disabled    = false;
      btn.textContent = '予約を確定する ✓';
      await loadSlots();
    } else {
      alert('エラーが発生しました。もう一度お試しください。');
      btn.disabled    = false;
      btn.textContent = '予約を確定する ✓';
    }
  } catch (err) {
    alert('通信エラーが発生しました。もう一度お試しください。');
    btn.disabled    = false;
    btn.textContent = '予約を確定する ✓';
  }
}

function closeComplete() {
  document.getElementById('completeScreen').classList.remove('open');
  selectedSlot = null;
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

setInterval(loadSlots, 15 * 60 * 1000);
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCw8HLg0q8nN6pnpV54feMB5LOQSTOXnNc&callback=initMap&language=ja" async defer></script>

</body>
</html>
